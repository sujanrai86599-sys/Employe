<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Sujan XYZ HR</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      min-height: 100vh;
    }
    :root {
      --gradient-primary: linear-gradient(135deg, #7C3AED, #4F46E5);
      --sidebar-width: 260px;
      --header-height: 64px;
      --card-radius: 20px;
      --btn-radius: 12px;
      --glass-bg: rgba(255,255,255,0.7);
      --glass-border: 1px solid rgba(255,255,255,0.4);
      --shadow-sm: 0 8px 32px rgba(0,0,0,0.05);
      --shadow-md: 0 20px 40px rgba(0,0,0,0.08);
    }
    /* Login Page */
    .login-container {
      display: flex;
      min-height: 100vh;
    }
    .login-left {
      flex: 1;
      background: var(--gradient-primary);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      color: white;
      position: relative;
      overflow: hidden;
    }
    .login-left::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15) 0%, transparent 50%);
      animation: float 6s infinite alternate;
    }
    @keyframes float {
      0% { transform: translate(0,0); }
      100% { transform: translate(30px, -30px); }
    }
    .login-left-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    .login-left-content .brand-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    }
    .login-left h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 2.5rem;
      letter-spacing: -0.5px;
    }
    .login-left p {
      margin-top: 0.75rem;
      font-weight: 400;
      opacity: 0.85;
      font-size: 1.1rem;
    }
    .login-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      padding: 2rem;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(20px);
      border-radius: var(--card-radius);
      padding: 2.5rem;
      box-shadow: var(--shadow-md);
      border: var(--glass-border);
    }
    .login-card h2 {
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #0f172a;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: #334155;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: var(--btn-radius);
      font-family: 'Inter', sans-serif;
      background: white;
      transition: all 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
    }
    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: var(--btn-radius);
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(124,58,237,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124,58,237,0.4);
    }
    /* Main App Layout */
    .app-container {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--gradient-primary);
      color: white;
      padding: 1.5rem 0;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
      backdrop-filter: blur(12px);
      box-shadow: 4px 0 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    .sidebar-brand {
      padding: 0 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .sidebar-brand h3 {
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      font-size: 1.25rem;
    }
    .sidebar-nav {
      flex: 1;
      padding: 0 1rem;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      margin-bottom: 0.25rem;
      transition: all 0.2s;
      font-weight: 500;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.15);
      color: white;
    }
    .nav-item i {
      width: 20px;
      height: 20px;
    }
    .logout-btn {
      margin: 1rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 0.7rem;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 500;
      transition: 0.2s;
    }
    .logout-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .main-content {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 1.5rem 2rem;
      background: #f8fafc;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .top-bar h2 {
      font-family: 'Sora', sans-serif;
      font-weight: 600;
      color: #0f172a;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Stat Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: white;
      border-radius: var(--card-radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      border: var(--glass-border);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: transform 0.2s;
    }
    .stat-card:hover {
      transform: translateY(-4px);
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.25rem;
    }
    .stat-info h4 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
    }
    .stat-info p {
      color: #64748b;
      font-size: 0.875rem;
    }
    .chart-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .chart-card {
      background: white;
      border-radius: var(--card-radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .employee-list-card {
      background: white;
      border-radius: var(--card-radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      max-height: 400px;
      overflow-y: auto;
    }
    .employee-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .employee-item img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: #e2e8f0;
    }
    .badge {
      background: #e0e7ff;
      color: #4338ca;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }
    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .toolbar input, .toolbar select {
      padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      background: white;
    }
    .btn {
      background: var(--gradient-primary);
      color: white;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 500;
    }
    .btn-outline {
      background: white;
      border: 1px solid #e2e8f0;
      color: #334155;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--card-radius);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    th, td {
      padding: 0.85rem 1rem;
      text-align: left;
      border-bottom: 1px solid #f1f5f9;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
      color: #475569;
    }
    .pagination {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      justify-content: center;
    }
    .pagination button {
      background: white;
      border: 1px solid #e2e8f0;
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
    }
    .pagination button.active {
      background: var(--gradient-primary);
      color: white;
      border: none;
    }
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15,23,42,0.5);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal {
      background: white;
      border-radius: var(--card-radius);
      padding: 2rem;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
    }
    .modal h3 {
      font-family: 'Sora', sans-serif;
      margin-bottom: 1.5rem;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
      }
      .sidebar-brand h3, .nav-item span {
        display: none;
      }
      .main-content {
        margin-left: 70px;
      }
      .chart-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-container">
    <div class="login-left">
      <div class="login-left-content">
        <div class="brand-icon"><i data-lucide="users" style="width:40px;height:40px;"></i></div>
        <h1>Sujan XYZ HR</h1>
        <p>Intelligent workforce management</p>
      </div>
    </div>
    <div class="login-right">
      <div class="login-card">
        <h2>Welcome back</h2>
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="admin@sujanxyz.hr" value="admin@sujanxyz.hr"></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" value="password123"></div>
        <div class="remember-forgot"><label><input type="checkbox"> Remember me</label><a href="#" style="color:#7C3AED;">Forgot password?</a></div>
        <button class="btn-primary" id="loginBtn">Sign In</button>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appMain" class="app-container" style="display:none;">
    <aside class="sidebar">
      <div class="sidebar-brand"><i data-lucide="layers" style="width:24px;height:24px;"></i><h3>Sujan XYZ</h3></div>
      <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="employees"><i data-lucide="users"></i><span>Employees</span></div>
        <div class="nav-item" data-page="departments"><i data-lucide="building"></i><span>Departments</span></div>
        <div class="nav-item" data-page="positions"><i data-lucide="briefcase"></i><span>Positions</span></div>
        <div class="nav-item" data-page="attendance"><i data-lucide="clock"></i><span>Attendance</span></div>
        <div class="nav-item" data-page="leaves"><i data-lucide="calendar"></i><span>Leaves</span></div>
        <div class="nav-item" data-page="payroll"><i data-lucide="dollar-sign"></i><span>Payroll</span></div>
      </nav>
      <button class="logout-btn" id="logoutBtn"><i data-lucide="log-out" style="width:18px;height:18px;"></i> Logout</button>
    </aside>
    <main class="main-content">
      <div id="pageContainer"></div>
    </main>
  </div>

  <!-- Generic Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
    lucide.createIcons();
    const API_BASE = '';
    const TOKEN_KEY = 'sujan_xyz_hr_token';
    let authToken = localStorage.getItem(TOKEN_KEY) || '';
    const setToken = (t) => { authToken = t; localStorage.setItem(TOKEN_KEY, t); };
    const clearToken = () => { authToken = ''; localStorage.removeItem(TOKEN_KEY); };
    const headers = () => ({ 'Content-Type': 'application/json', Authorization: `Bearer ${authToken}` });

    // SPA Routing
    const pages = ['dashboard','employees','departments','positions','attendance','leaves','payroll'];
    let currentPage = 'dashboard';
    function navigate(page) {
      if (!authToken) { showLogin(); return; }
      currentPage = page;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const navItem = document.querySelector(`.nav-item[data-page="${page}"]`);
      if (navItem) navItem.classList.add('active');
      renderPage(page);
      window.location.hash = page;
    }
    window.addEventListener('hashchange', () => {
      const hash = window.location.hash.replace('#','');
      if (pages.includes(hash)) navigate(hash);
      else navigate('dashboard');
    });

    function showLogin() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appMain').style.display = 'none';
    }
    function showApp() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appMain').style.display = 'flex';
      if (!window.location.hash || !pages.includes(window.location.hash.replace('#',''))) {
        navigate('dashboard');
      } else {
        navigate(window.location.hash.replace('#',''));
      }
    }

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        const res = await fetch(`${API_BASE}/api/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
        const data = await res.json();
        if (res.ok && data.token) {
          setToken(data.token);
          showApp();
        } else {
          alert('Invalid credentials');
        }
      } catch(e) { alert('Login failed'); }
    });
    document.getElementById('logoutBtn').addEventListener('click', () => { clearToken(); showLogin(); window.location.hash = ''; });

    // Page Rendering
    function renderPage(page) {
      const container = document.getElementById('pageContainer');
      switch(page) {
        case 'dashboard': container.innerHTML = dashboardHTML(); loadDashboard(); break;
        case 'employees': container.innerHTML = employeesHTML(); loadEmployees(); break;
        case 'departments': container.innerHTML = departmentsHTML(); loadDepartments(); break;
        case 'positions': container.innerHTML = positionsHTML(); loadPositions(); break;
        case 'attendance': container.innerHTML = attendanceHTML(); loadAttendance(); break;
        case 'leaves': container.innerHTML = leavesHTML(); loadLeaves(); break;
        case 'payroll': container.innerHTML = payrollHTML(); loadPayroll(); break;
      }
      lucide.createIcons();
    }

    // Dashboard HTML & Logic
    function dashboardHTML() {
      return `
        <div class="top-bar"><h2>Dashboard</h2></div>
        <div class="stats-grid" id="statsCards"></div>
        <div class="chart-row">
          <div class="chart-card"><h4>Hiring Trend</h4><canvas id="hiringChart" height="200"></canvas></div>
          <div class="chart-card"><h4>Department Mix</h4><canvas id="deptChart" height="200"></canvas></div>
        </div>
        <div class="chart-row">
          <div class="employee-list-card"><h4>Employees by Position</h4><div id="empByPosList"></div></div>
          <div class="chart-card"><h4>Status Breakdown</h4><canvas id="statusChart" height="200"></canvas></div>
        </div>
        <div class="chart-row"><div class="chart-card"><h4>Attendance Trend (7 days)</h4><canvas id="attChart" height="100"></canvas></div></div>`;
    }
    async function loadDashboard() {
      try {
        const res = await fetch(`${API_BASE}/api/dashboard/stats`, { headers: headers() });
        const data = await res.json();
        document.getElementById('statsCards').innerHTML = [
          {label:'Employees', value:data.total_employees, color:'#3B82F6'},
          {label:'Departments', value:data.total_departments, color:'#10B981'},
          {label:'Positions', value:data.total_positions, color:'#F59E0B'},
          {label:'Attendance Today', value:data.attendance_today, color:'#EC4899'},
          {label:'Payrolls', value:data.total_payrolls, color:'#06B6D4'}
        ].map(s => `<div class="stat-card"><div class="stat-icon" style="background:${s.color}"><i data-lucide="${s.label==='Employees'?'users':s.label==='Departments'?'building':s.label==='Positions'?'briefcase':'calendar'}"></i></div><div class="stat-info"><h4>${s.value}</h4><p>${s.label}</p></div></div>`).join('');
        lucide.createIcons();

        // Hiring Chart
        const hiringCtx = document.getElementById('hiringChart').getContext('2d');
        new Chart(hiringCtx, { type:'bar', data:{ labels: data.hiring_months, datasets:[{ label:'Hires', data: data.hiring_counts, backgroundColor:'#7C3AED' }] } });

        // Department Mix
        const deptCtx = document.getElementById('deptChart').getContext('2d');
        new Chart(deptCtx, { type:'doughnut', data:{ labels: data.dept_labels, datasets:[{ data: data.dept_counts, backgroundColor: ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40'] }] } });

        // Status Breakdown
        const statusCtx = document.getElementById('statusChart').getContext('2d');
        new Chart(statusCtx, { type:'doughnut', data:{ labels: data.status_labels, datasets:[{ data: data.status_counts, backgroundColor: ['#10B981','#EF4444','#F59E0B','#8B5CF6'] }] } });

        // Attendance Trend
        const attCtx = document.getElementById('attChart').getContext('2d');
        new Chart(attCtx, { type:'line', data:{ labels: data.att_dates, datasets:[{ label:'Present', data: data.att_present, borderColor:'#10B981', fill:false },{ label:'Absent', data: data.att_absent, borderColor:'#EF4444', fill:false }] } });

        // Employees by Position
        document.getElementById('empByPosList').innerHTML = data.employees_by_position.map(e => `
          <div class="employee-item"><img src="${e.profile_pic || `https://api.dicebear.com/7.x/initials/svg?backgroundColor=6D28D9&text=${encodeURIComponent(e.name.charAt(0))}`}" alt=""><span>${e.name}</span><span class="badge">${e.position}</span></div>`).join('');
      } catch(e) { console.error(e); }
    }

    // Generic CRUD Templates (simplified)
    function employeesHTML() { return pageWithTable('Employees', ['Name','Email','Phone','Department','Position','Status'], 'employees'); }
    function departmentsHTML() { return pageWithTable('Departments', ['Name','Description'], 'departments'); }
    function positionsHTML() { return pageWithTable('Positions', ['Title','Department','Assigned Employees'], 'positions'); }
    function attendanceHTML() { return pageWithTable('Attendance', ['Employee','Date','Status'], 'attendance'); }
    function leavesHTML() { return pageWithTable('Leaves', ['Employee','Type','Start','End','Status'], 'leaves'); }
    function payrollHTML() { return pageWithTable('Payroll', ['Employee','Month','Basic Salary','Net Salary','Status'], 'payroll'); }

    function pageWithTable(title, columns, entity) {
      return `
        <div class="top-bar"><h2>${title}</h2></div>
        <div class="toolbar">
          <input type="text" placeholder="Search..." oninput="filterTable('${entity}')" id="${entity}Search">
          <button class="btn" onclick="openModal('${entity}')"><i data-lucide="plus"></i> Add</button>
          <button class="btn btn-outline" onclick="refreshTable('${entity}')"><i data-lucide="refresh-cw"></i></button>
        </div>
        <table id="${entity}Table"><thead><tr>${columns.map(c=>`<th>${c}</th>`).join('')}<th>Actions</th></tr></thead><tbody></tbody></table>
        <div class="pagination" id="${entity}Pagination"></div>`;
    }

    // Data fetching & rendering
    const state = { employees:[], departments:[], positions:[], attendance:[], leaves:[], payroll:[] };
    async function refreshTable(entity) {
      try {
        const res = await fetch(`${API_BASE}/api/${entity}`, { headers: headers() });
        const data = await res.json();
        state[entity] = data;
        renderTable(entity);
      } catch(e) { console.error(e); }
    }
    function renderTable(entity) {
      const tbody = document.querySelector(`#${entity}Table tbody`);
      const list = state[entity];
      tbody.innerHTML = list.map(item => rowHTML(entity, item)).join('');
      setupPagination(entity);
    }
    function rowHTML(entity, item) {
      if (entity === 'employees') return `<tr><td>${item.name}</td><td>${item.email}</td><td>${item.phone||''}</td><td>${item.department_name||''}</td><td>${item.position_title||''}</td><td><span class="badge">${item.status}</span></td><td><button onclick="editItem('${entity}',${item.id})"><i data-lucide="edit"></i></button> <button onclick="deleteItem('${entity}',${item.id})"><i data-lucide="trash-2"></i></button></td></tr>`;
      if (entity === 'departments') return `<tr><td>${item.name}</td><td>${item.description||''}</td><td><button onclick="editItem('${entity}',${item.id})"><i data-lucide="edit"></i></button> <button onclick="deleteItem('${entity}',${item.id})"><i data-lucide="trash-2"></i></button></td></tr>`;
      if (entity === 'positions') return `<tr><td>${item.title}</td><td>${item.department_name||''}</td><td>${item.assigned_employees||0}</td><td><button onclick="editItem('${entity}',${item.id})"><i data-lucide="edit"></i></button> <button onclick="deleteItem('${entity}',${item.id})"><i data-lucide="trash-2"></i></button> <button onclick="assignEmployee(${item.id})"><i data-lucide="user-plus"></i></button></td></tr>`;
      if (entity === 'attendance') return `<tr><td>${item.employee_name}</td><td>${item.date}</td><td>${item.status}</td><td><button onclick="editItem('${entity}',${item.id})"><i data-lucide="edit"></i></button> <button onclick="deleteItem('${entity}',${item.id})"><i data-lucide="trash-2"></i></button></td></tr>`;
      if (entity === 'leaves') return `<tr><td>${item.employee_name}</td><td>${item.type}</td><td>${item.start_date}</td><td>${item.end_date}</td><td>${item.status}</td><td><button onclick="editItem('${entity}',${item.id})"><i data-lucide="edit"></i></button> <button onclick="deleteItem('${entity}',${item.id})"><i data-lucide="trash-2"></i></button></td></tr>`;
      if (entity === 'payroll') return `<tr><td>${item.employee_name}</td><td>${item.month}</td><td>${item.basic_salary}</td><td>${item.net_salary}</td><td>${item.status}</td><td><button onclick="editItem('${entity}',${item.id})"><i data-lucide="edit"></i></button> <button onclick="deleteItem('${entity}',${item.id})"><i data-lucide="trash-2"></i></button></td></tr>`;
    }
    function setupPagination(entity) { /* simplified: static display all for now */ }

    // Modal handling
    function openModal(entity, id=null) {
      const overlay = document.getElementById('modalOverlay');
      const content = document.getElementById('modalContent');
      const isEdit = id !== null;
      let form = '';
      if (entity === 'employees') form = employeeForm(isEdit ? state.employees.find(e=>e.id==id) : {});
      else if (entity === 'departments') form = deptForm(isEdit ? state.departments.find(d=>d.id==id) : {});
      else if (entity === 'positions') form = positionForm(isEdit ? state.positions.find(p=>p.id==id) : {});
      else if (entity === 'attendance') form = attendanceForm(isEdit ? state.attendance.find(a=>a.id==id) : {});
      else if (entity === 'leaves') form = leaveForm(isEdit ? state.leaves.find(l=>l.id==id) : {});
      else if (entity === 'payroll') form = payrollForm(isEdit ? state.payroll.find(p=>p.id==id) : {});
      content.innerHTML = `<h3>${isEdit?'Edit':'Add'} ${entity.slice(0,-1)}</h3>${form}<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn" id="saveModalBtn">Save</button></div>`;
      document.getElementById('saveModalBtn').addEventListener('click', ()=> saveItem(entity, id));
      overlay.classList.add('active');
      if (entity === 'employees') initProfilePic();
    }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    async function saveItem(entity, id) {
      const form = document.querySelector('#modalContent form');
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());
      if (entity === 'employees') {
        payload.profile_pic = document.getElementById('profilePicData')?.value || '';
      }
      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_BASE}/api/${entity}/${id}` : `${API_BASE}/api/${entity}`;
      await fetch(url, { method, headers: headers(), body: JSON.stringify(payload) });
      closeModal();
      refreshTable(entity);
    }
    async function deleteItem(entity, id) {
      if (confirm('Delete?')) {
        await fetch(`${API_BASE}/api/${entity}/${id}`, { method:'DELETE', headers: headers() });
        refreshTable(entity);
      }
    }
    function editItem(entity, id) { openModal(entity, id); }

    // Profile picture resize
    function initProfilePic() {
      document.getElementById('profileUpload')?.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            canvas.width = 200; canvas.height = 200;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 200, 200);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById('profilePicData').value = dataUrl;
            document.getElementById('picPreview').src = dataUrl;
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // Form templates
    function employeeForm(data={}) {
      return `<form>
        <input name="name" value="${data.name||''}" placeholder="Name" required>
        <input name="email" value="${data.email||''}" placeholder="Email">
        <input name="phone" value="${data.phone||''}" placeholder="Phone">
        <select name="department_id">${state.departments.map(d=>`<option value="${d.id}" ${data.department_id==d.id?'selected':''}>${d.name}</option>`)}</select>
        <select name="position_id">${state.positions.map(p=>`<option value="${p.id}" ${data.position_id==p.id?'selected':''}>${p.title}</option>`)}</select>
        <input name="salary" value="${data.salary||''}" placeholder="Salary">
        <select name="status"><option>active</option><option>inactive</option></select>
        <div><img id="picPreview" src="${data.profile_pic||'https://api.dicebear.com/7.x/initials/svg?backgroundColor=6D28D9'}" width="50"><input type="file" id="profileUpload" accept="image/*"><input type="hidden" id="profilePicData" name="profile_pic" value="${data.profile_pic||''}"></div>
      </form>`;
    }
    function deptForm(data={}) { return `<form><input name="name" value="${data.name||''}" placeholder="Name"><input name="description" value="${data.description||''}"></form>`; }
    function positionForm(data={}) { return `<form><input name="title" value="${data.title||''}" placeholder="Title"><select name="department_id">${state.departments.map(d=>`<option value="${d.id}">${d.name}</option>`)}</select></form>`; }
    async function assignEmployee(posId) {
      const emp = prompt('Employee ID to assign:');
      if (emp) {
        await fetch(`${API_BASE}/api/employees/${emp}`, { method:'PUT', headers:headers(), body: JSON.stringify({position_id: posId}) });
        refreshTable('positions');
      }
    }
    // Load initial data after login
    function loadEmployees() { refreshTable('employees'); }
    function loadDepartments() { refreshTable('departments'); }
    function loadPositions() { refreshTable('positions'); }
    function loadAttendance() { refreshTable('attendance'); }
    function loadLeaves() { refreshTable('leaves'); }
    function loadPayroll() { refreshTable('payroll'); }

    // Init check
    if (authToken) showApp(); else showLogin();
  </script>
</body>
</html>
